<!-- WORKING CONTACT FORM FOR THEFORWARDHORIZON.COM -->
<!-- Replace your current contact form with this code -->

<form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-6">
  <!-- First Name -->
  <div>
    <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">
      First Name *
    </label>
    <input 
      type="text" 
      id="firstName" 
      name="firstName" 
      required 
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      placeholder="Enter your first name"
    />
  </div>

  <!-- Last Name -->
  <div>
    <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">
      Last Name *
    </label>
    <input 
      type="text" 
      id="lastName" 
      name="lastName" 
      required 
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      placeholder="Enter your last name"
    />
  </div>

  <!-- Email -->
  <div>
    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
      Email Address *
    </label>
    <input 
      type="email" 
      id="email" 
      name="email" 
      required 
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      placeholder="Enter your email address"
    />
  </div>

  <!-- Phone -->
  <div>
    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
      Phone Number
    </label>
    <input 
      type="tel" 
      id="phone" 
      name="phone" 
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      placeholder="(555) 123-4567"
    />
  </div>

  <!-- Interest -->
  <div>
    <label for="interest" class="block text-sm font-medium text-gray-700 mb-2">
      I'm interested in: *
    </label>
    <select 
      id="interest" 
      name="interest" 
      required 
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
    >
      <option value="">Select an option</option>
      <option value="Veterans Housing Program">Veterans Housing Program</option>
      <option value="Recovery Housing">Recovery Housing</option>
      <option value="Re-entry Support">Re-entry Support</option>
      <option value="General Information">General Information</option>
      <option value="Volunteering">Volunteering</option>
      <option value="Donations">Donations</option>
      <option value="Partnership">Partnership Opportunities</option>
    </select>
  </div>

  <!-- Message -->
  <div>
    <label for="message" class="block text-sm font-medium text-gray-700 mb-2">
      Message *
    </label>
    <textarea 
      id="message" 
      name="message" 
      required 
      rows="4" 
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      placeholder="Tell us how we can help you or how you'd like to get involved..."
    ></textarea>
  </div>

  <!-- Submit Button -->
  <div>
    <button 
      type="submit" 
      class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors font-medium"
    >
      Send Message
    </button>
  </div>

  <!-- Response Message -->
  <p class="text-sm text-gray-600 text-center">
    We'll respond within 24 hours during business days
  </p>
</form>

<!-- Success/Error Messages -->
<div id="formMessage" class="hidden mt-4 p-4 rounded-lg"></div>

<script>
// Enhanced form handling with better error handling
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const form = e.target;
  const formData = new FormData(form);
  const submitButton = form.querySelector('button[type="submit"]');
  const messageDiv = document.getElementById('formMessage');
  
  // Show loading state
  submitButton.disabled = true;
  submitButton.textContent = 'Sending...';
  messageDiv.className = 'hidden';
  
  try {
    // Option 1: Use Formspree (recommended)
    const response = await fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    });
    
    if (response.ok) {
      // Success
      messageDiv.className = 'mt-4 p-4 rounded-lg bg-green-50 border border-green-200';
      messageDiv.innerHTML = `
        <div class="flex items-center">
          <svg class="w-5 h-5 text-green-600 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
          </svg>
          <span class="text-green-800 font-medium">Message sent successfully! We'll get back to you within 24 hours.</span>
        </div>
      `;
      form.reset();
    } else {
      throw new Error('Form submission failed');
    }
  } catch (error) {
    // Error
    messageDiv.className = 'mt-4 p-4 rounded-lg bg-red-50 border border-red-200';
    messageDiv.innerHTML = `
      <div class="flex items-center">
        <svg class="w-5 h-5 text-red-600 mr-2" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
        </svg>
        <div>
          <span class="text-red-800 font-medium">Message failed to send.</span>
          <p class="text-red-700 text-sm mt-1">Please call us directly at (626) 888-7776 or email info@theforwardhorizon.com</p>
        </div>
      </div>
    `;
  }
  
  // Reset button
  submitButton.disabled = false;
  submitButton.textContent = 'Send Message';
});
</script>
